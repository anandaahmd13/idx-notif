# IDX Alert Bot configuration
# Copy/edit this file; secrets go in .env, not here.

poll:
  # Interval polling SAAT jam bursa buka (detik). Cepat = reaksi cepat.
  market_interval_seconds: 5
  # Interval polling DI LUAR jam bursa (detik). Dipakai HANYA bila
  # schedule.always_open = false. Dengan always_open=true nilai ini diabaikan.
  off_interval_seconds: 60
  # Berapa pengumuman diambil per poll (terbaru dulu). Beri ruang lebih agar
  # burst pengumuman tidak menggeser item keluar jendela sebelum sempat terlihat.
  page_size: 50
  # Language of the IDX feed: "id" or "en".
  lang: id

schedule:
  # Bursa Indonesia = WIB (UTC+7), tidak ada DST.
  utc_offset_hours: 7
  # Jendela jam bursa (waktu WIB). Di luar jendela ini polling melambat.
  market_open: "08:45"
  market_close: "15:00"
  # Hari aktif: 0=Senin ... 6=Minggu. Default Senin-Jumat.
  weekdays: [0, 1, 2, 3, 4]
  # Realtime 24 jam: abaikan jendela & hari bursa, selalu polling cepat
  # (market_interval_seconds). Set false untuk kembali hemat di luar jam bursa.
  always_open: true

filter:
  # Case-insensitive substring match against the announcement subject/title.
  # An announcement alerts if ANY keyword matches. Empty list = match all.
  keywords:
    # --- Penambahan/pengurangan modal ---
    - "Penambahan Modal"
    - "HMETD"                 # rights issue
    - "Tanpa HMETD"           # private placement / PMTHMETD
    - "PMHMETD"
    - "PMTHMETD"
    - "Pengurangan Modal"
    # --- Buyback ---
    - "Pembelian Kembali"
    - "Buyback"
    - "Pengalihan Kembali"    # pengalihan saham hasil buyback
    # --- Dividen ---
    - "Dividen"
    # --- Saham: split / bonus / konversi ---
    - "Stock Split"
    - "Pemecahan Saham"
    - "Penggabungan Saham"    # reverse stock split
    - "Reverse Stock"
    - "Saham Bonus"
    - "Waran"
    - "Obligasi Konversi"
    # --- Merger / akuisisi / restrukturisasi ---
    - "Penggabungan Usaha"    # merger
    - "Peleburan Usaha"
    - "Pengambilalihan"       # akuisisi
    - "Akuisisi"
    - "Divestasi"
    # --- Penawaran & keterbukaan ---
    - "Penawaran Tender"
    - "Tender Offer"
    - "Aksi Korporasi"        # banyak judul memang memuat frasa ini
    - "Keterbukaan Informasi"
    # --- RUPS ---
    - "RUPS"                  # catatan: sering muncul, bisa jadi banyak notif
  # Optional ticker whitelist. Empty list = all emiten allowed.
  # If set, an announcement must match a keyword AND be from one of these tickers.
  emiten: []
  # Gerbang kesegaran (menit): "realtime seperti web". Hanya alert pengumuman
  # yang terbit dalam rentang ini dari sekarang. Backlog lama (mis. saat bot
  # baru dinyalakan setelah mati) dilewati diam-diam, tidak membanjiri channel.
  # 0 = mati (kirim semua yang terlewat). 60 = hanya 1 jam terakhir.
  max_age_minutes: 60

telegram:
  # Which keyword label to show in the alert header (cosmetic).
  channel_title: "Alert IDX Channel"

download:
  # Download the announcement PDF and attach it to the Telegram message.
  attach_pdf: true
  # Skip PDFs larger than this (bytes) to avoid Telegram's 50MB limit / spam.
  max_pdf_bytes: 20971520

web:
  # Halaman status/monitoring (uptime, poll terakhir, alert terkirim, error).
  # Default mati. Aktifkan untuk memantau kesehatan bot dari browser.
  enabled: false
  # Di VPS publik biarkan 127.0.0.1 lalu akses via SSH tunnel — halaman ini
  # TANPA autentikasi. Pakai 0.0.0.0 hanya bila di belakang firewall.
  host: "127.0.0.1"
  port: 8080

dashboard:
  # Dashboard FastAPI: feed pengumuman realtime (SSE) + chart historis.
  # Jalankan via `python -m idxbot.app` (proses TERPISAH dari `python -m idxbot`).
  # Menjalankan poll loop-nya sendiri + menyimpan riwayat ke SQLite.
  enabled: false
  # 127.0.0.1 = akses via SSH tunnel. Untuk bind publik (0.0.0.0), WAJIB set
  # DASHBOARD_USER + DASHBOARD_PASS di .env atau app menolak start.
  host: "127.0.0.1"
  port: 8000
  # Berkas SQLite riwayat (di volume ./data agar persisten).
  db_path: "data/history.db"
  # Berapa alert terbaru ditampilkan di feed saat halaman dibuka.
  recent_limit: 50
