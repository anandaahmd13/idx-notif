services:
  idxbot:
    build: .
    container_name: idx-alert-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist dedupe state across restarts so old announcements don't re-alert.
      - ./data:/app/data
      # Live-edit filters/keywords without rebuilding the image.
      - ./config.yaml:/app/config.yaml:ro
    environment:
      # Keep seen.json on the mounted volume.
      - IDX_SEEN_PATH=/app/data/seen.json
    # Chromium needs a bit of shared memory even with --disable-dev-shm-usage.
    shm_size: "512mb"
    # Halaman status: aktifkan web.enabled + host "0.0.0.0" di config.yaml,
    # lalu buka port ini. Biarkan komentar bila web dimatikan.
    # ports:
    #   - "8080:8080"
    # Healthcheck memakai endpoint /healthz (perlu web.enabled = true).
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz').status==200 else 1)"]
    #   interval: 60s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 30s

